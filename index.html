<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTrade X - Live Deriv API Connection</title>
    <style>
        :root {
            --bg-dark: #0e1117;
            --bg-panel: #161a25;
            --bg-hover: #1e232d;
            --primary: #ff444f;
            --accent: #2563eb;
            --text-main: #ffffff;
            --text-muted: #8b96a5;
            --border: #2a2e39;
            --success: #0faf59;
            --danger: #ff444f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { background-color: var(--bg-dark); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Login Modal */
        #loginModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: var(--bg-panel); padding: 30px; border-radius: 8px;
            border: 1px solid var(--border); width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .login-box h2 { margin-bottom: 20px; text-align: center; color: var(--text-main); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; color: var(--text-muted); margin-bottom: 5px; font-size: 0.9rem; }
        .input-group input { 
            width: 100%; padding: 10px; border-radius: 4px; border: 1px solid var(--border);
            background: var(--bg-dark); color: white; outline: none;
        }
        .btn-full { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn-full:hover { opacity: 0.9; }

        /* App Structure */
        header {
            height: 60px; background: var(--bg-panel); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 20px; justify-content: space-between;
        }
        .logo { font-weight: 700; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--primary); }
        .balance-badge { background: #2a2e39; padding: 5px 12px; border-radius: 4px; font-weight: 600; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: gray; display: inline-block; margin-right: 5px; }
        .status-dot.connected { background: var(--success); }

        main { flex: 1; display: grid; grid-template-columns: 1fr 320px; grid-template-rows: 50px 1fr; height: calc(100vh - 60px); }

        .asset-bar { grid-column: 1 / -1; background: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 20px; }
        .asset-item { padding: 8px 16px; cursor: pointer; border-radius: 4px; font-size: 0.9rem; border: 1px solid transparent; }
        .asset-item:hover { background: var(--bg-hover); }
        .asset-item.active { background: rgba(37, 99, 235, 0.1); color: var(--accent); border-color: rgba(37, 99, 235, 0.3); }

        .chart-section { position: relative; background: var(--bg-dark); display: flex; flex-direction: column; }
        #chartCanvas { width: 100%; height: 100%; cursor: crosshair; }

        .trade-panel { background: var(--bg-panel); border-left: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .btn-up { background: var(--success); color: white; font-weight: bold; padding: 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
        .btn-down { background: var(--danger); color: white; font-weight: bold; padding: 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
        .trade-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .input-wrapper { background: var(--bg-dark); border: 1px solid var(--border); border-radius: 4px; display: flex; align-items: center; }
        .input-wrapper input { background: transparent; border: none; color: white; padding: 10px; width: 100%; text-align: center; }

        .ai-section { margin-top: auto; border-top: 1px solid var(--border); padding-top: 15px; }
        .ai-log { font-family: monospace; font-size: 0.75rem; color: #888; background: #000; padding: 10px; height: 80px; overflow-y: auto; margin-top: 10px; }
        
        /* Notifications */
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--bg-panel); padding: 15px; border-left: 4px solid var(--accent); border-radius: 4px; animation: slideIn 0.3s; min-width: 250px; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

    </style>
</head>
<body>

<!-- Login Modal -->
<div id="loginModal">
    <div class="login-box">
        <h2>Deriv API Login</h2>
        <div class="input-group">
            <label>App ID</label>
            <input type="number" id="appIdInput" placeholder="e.g., 1089" value="1089"> <!-- Default is a public testing ID, use your own -->
        </div>
        <div class="input-group">
            <label>API Token (Read + Trade)</label>
            <input type="password" id="apiTokenInput" placeholder="Paste token here">
        </div>
        <button class="btn-full" onclick="connectToDeriv()">Connect & Login</button>
        <p style="margin-top:15px; font-size:0.8rem; color:#666; text-align:center;">
            Warning: Real Trading involves financial risk. Use Demo tokens to test first.
        </p>
    </div>
</div>

<header>
    <div class="logo">ProTrade <span>X</span></div>
    <div class="account-info">
        <div id="connectionStatus"><span class="status-dot"></span> Disconnected</div>
        <div class="balance-badge" id="balanceDisplay">Balance: --</div>
    </div>
</header>

<main>
    <div class="asset-bar">
        <div class="asset-item active" onclick="changeMarket('R_100', this)">Volatility 100</div>
        <div class="asset-item" onclick="changeMarket('R_10', this)">Volatility 10</div>
        <div class="asset-item" onclick="changeMarket('R_25', this)">Volatility 25</div>
        <div class="asset-item" onclick="changeMarket('R_50', this)">Volatility 50</div>
        <div class="asset-item" onclick="changeMarket('R_75', this)">Volatility 75</div>
    </div>

    <div class="chart-section">
        <canvas id="chartCanvas"></canvas>
    </div>

    <div class="trade-panel">
        <div class="input-group">
            <label>Stake (USD)</label>
            <div class="input-wrapper">
                <input type="number" id="stakeInput" value="10" min="1">
            </div>
        </div>
        <div class="input-group">
            <label>Duration (Ticks)</label>
            <div class="input-wrapper">
                <input type="number" id="tickDuration" value="5" min="1" max="10">
            </div>
        </div>
        
        <div class="trade-row">
            <button class="btn-up" onclick="placeTrade('CALL')">Buy <br><span id="callPayout">--</span></button>
            <button class="btn-down" onclick="placeTrade('PUT')">Sell <br><span id="putPayout">--</span></button>
        </div>

        <div class="ai-section">
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
                <strong style="color:#a855f7">AI Autotrader</strong>
                <input type="checkbox" id="aiToggle" onchange="toggleAI()">
            </div>
            <div class="ai-log" id="aiLog">Waiting for connection...</div>
        </div>
    </div>
</main>

<div class="toast-container" id="toastContainer"></div>

<script>
    // --- Deriv API Service ---
    class DerivService {
        constructor() {
            this.ws = null;
            this.appId = null;
            this.token = null;
            this.currentSymbol = 'R_100';
            this.pingInterval = null;
            this.tickHistory = [];
            this.tickBuffer = []; // Buffer to build 1-second candles
            this.onTickUpdate = null;
            this.onBalanceUpdate = null;
            this.onOpenContract = null;
            this.onProfitUpdate = null;
        }

        connect(appId, token) {
            this.appId = appId;
            this.token = token;
            
            // Standard Deriv WebSocket Endpoint
            this.ws = new WebSocket(`wss://ws.binaryws.com/websockets/v3?app_id=${appId}`);

            this.ws.onopen = () => {
                this.authorize();
                this.startPing();
                showToast("Connected to Deriv Server", "success");
                updateStatus(true);
            };

            this.ws.onmessage = (msg) => this.handleMessage(JSON.parse(msg.data));
            
            this.ws.onclose = () => {
                updateStatus(false);
                showToast("Disconnected", "error");
                clearInterval(this.pingInterval);
            };
        }

        startPing() {
            this.pingInterval = setInterval(() => {
                if(this.ws.readyState === WebSocket.OPEN) this.ws.send(JSON.stringify({ ping: 1 }));
            }, 10000); // Keepalive
        }

        authorize() {
            this.ws.send(JSON.stringify({ authorize: this.token }));
        }

        subscribeTicks(symbol) {
            this.currentSymbol = symbol;
            // Forget all previous streams to clean up
            this.ws.send(JSON.stringify({ forget_all: "ticks" })); 
            // Forget all proposals
            this.ws.send(JSON.stringify({ forget_all: "proposal" }));
            
            // Subscribe to new ticks
            this.ws.send(JSON.stringify({ ticks: symbol, subscribe: 1 }));
            
            // Clear local buffers
            this.tickBuffer = [];
            this.tickHistory = [];
            
            // Get history for the chart (last 1000 ticks)
            this.ws.send(JSON.stringify({ 
                ticks_history: symbol, 
                count: 1000, 
                end: "latest", 
                style: "ticks",
                subscribe: 1 
            }));
        }

        placeContract(contractType) {
            const stake = document.getElementById('stakeInput').value;
            const duration = document.getElementById('tickDuration').value;
            
            // Direct Buy Request (Requires parameters object)
            const buyRequest = {
                buy: 1,
                price: parseFloat(stake),
                parameters: {
                    amount: parseFloat(stake),
                    basis: "stake",
                    contract_type: contractType,
                    currency: "USD",
                    duration: parseInt(duration),
                    duration_unit: "t",
                    symbol: this.currentSymbol
                }
            };
            
            this.ws.send(JSON.stringify(buyRequest));
        }

        subscribeToOpenContract(contractId) {
            this.ws.send(JSON.stringify({ 
                proposal_open_contract: 1, 
                contract_id: contractId, 
                subscribe: 1 
            }));
        }

        handleMessage(data) {
            const msgType = data.msg_type;

            if (msgType === 'authorize') {
                if (data.error) {
                    showToast(`Auth Failed: ${data.error.message}`, "error");
                } else {
                    document.getElementById('balanceDisplay').innerText = `Balance: ${data.authorize.balance} USD`;
                    this.subscribeTicks(this.currentSymbol);
                }
            }
            else if (msgType === 'tick') {
                this.processLiveTick(data.tick);
            }
            else if (msgType === 'history') {
                // Initial batch of history
                const prices = data.history.prices;
                const times = data.history.times;
                // Combine them
                const historyTicks = prices.map((p, i) => ({ quote: p, epoch: times[i] }));
                this.tickHistory = historyTicks; // Store full history
                // Trigger chart redraw
                if(this.onTickUpdate) this.onTickUpdate(this.getAggregatedCandles());
            }
            else if (msgType === 'buy') {
                if (data.error) {
                    showToast(`Trade Error: ${data.error.message}`, "error");
                } else {
                    showToast(`Contract Bought: ${data.buy.contract_id}`, "success");
                    // Subscribe to updates for this contract
                    this.subscribeToOpenContract(data.buy.contract_id);
                }
            }
            else if (msgType === 'proposal_open_contract') {
                const contract = data.proposal_open_contract;
                if (contract.is_sold) {
                    // Contract finished
                    const profit = contract.profit;
                    showToast(`Trade Closed: ${profit > 0 ? 'WIN' : 'LOSS'} ($${profit})`, profit > 0 ? "success" : "error");
                    // Refresh balance
                    this.authorize(); // Lazy way to update balance after trade
                } else {
                    // Update live P/L
                    if (this.onProfitUpdate) this.onProfitUpdate(contract);
                }
            }
        }

        processLiveTick(tick) {
            // 1. Add to history buffer
            this.tickHistory.push({ quote: tick.quote, epoch: tick.epoch });
            if(this.tickHistory.length > 1000) this.tickHistory.shift();

            // 2. Logic for AI / Indicators runs on live tick
            if (this.onTickUpdate) {
                const candles = this.getAggregatedCandles();
                this.onTickUpdate(candles);
            }
        }

        // Convert raw ticks into 1-second candles for the chart
        getAggregatedCandles() {
            const candles = [];
            let currentCandle = null;

            // We iterate backwards from the latest tick to build candles
            // Ideally, this should be optimized, but for 1000 ticks it's fast enough in JS
            for (let i = 0; i < this.tickHistory.length; i++) {
                const tick = this.tickHistory[i];
                const tickTime = Math.floor(tick.epoch); // floor to second

                if (!currentCandle) {
                    currentCandle = { 
                        open: tick.quote, 
                        high: tick.quote, 
                        low: tick.quote, 
                        close: tick.quote, 
                        timestamp: tickTime 
                    };
                } else {
                    if (tickTime === currentCandle.timestamp) {
                        // Still in same second
                        currentCandle.close = tick.quote;
                        if (tick.quote > currentCandle.high) currentCandle.high = tick.quote;
                        if (tick.quote < currentCandle.low) currentCandle.low = tick.quote;
                    } else {
                        // New second started
                        candles.push(currentCandle);
                        currentCandle = { 
                            open: tick.quote, 
                            high: tick.quote, 
                            low: tick.quote, 
                            close: tick.quote, 
                            timestamp: tickTime 
                        };
                    }
                }
            }
            if (currentCandle) candles.push(currentCandle);
            
            // Return in chronological order (oldest first)
            return candles;
        }
    }

    // --- Global App State ---
    const deriv = new DerivService();
    let candles = [];
    let isAiRunning = false;

    // --- Charting (Reusable from previous logic) ---
    const canvas = document.getElementById('chartCanvas');
    const ctx = canvas.getContext('2d');
    let chartZoom = 50; // Show last 50 seconds

    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        if(candles.length > 0) drawChart();
    }
    window.addEventListener('resize', resizeCanvas);

    function drawChart() {
        const width = canvas.width;
        const height = canvas.height;
        ctx.clearRect(0, 0, width, height);

        const visibleCandles = candles.slice(-chartZoom);
        if (visibleCandles.length === 0) return;

        let min = Math.min(...visibleCandles.map(c => c.low));
        let max = Math.max(...visibleCandles.map(c => c.high));
        const padding = (max - min) * 0.1;
        min -= padding;
        max += padding;
        const range = max - min;

        const candleWidth = width / visibleCandles.length;
        const gap = candleWidth * 0.2;
        
        const getY = (price) => height - ((price - min) / range) * height;
        const getX = (i) => i * candleWidth;

        visibleCandles.forEach((c, i) => {
            const x = getX(i) + gap/2;
            const yOpen = getY(c.open);
            const yClose = getY(c.close);
            const yHigh = getY(c.high);
            const yLow = getY(c.low);
            const isBull = c.close >= c.open;
            
            ctx.fillStyle = isBull ? '#0faf59' : '#ff444f';
            ctx.strokeStyle = isBull ? '#0faf59' : '#ff444f';
            
            // Wick
            ctx.beginPath();
            ctx.moveTo(x + (candleWidth-gap)/2, yHigh);
            ctx.lineTo(x + (candleWidth-gap)/2, yLow);
            ctx.stroke();

            // Body
            const h = Math.abs(yOpen - yClose) || 1;
            ctx.fillRect(x, Math.min(yOpen, yClose), candleWidth - gap, h);
        });

        // Current Price Line
        if(candles.length > 0) {
            const last = candles[candles.length-1].close;
            const y = getY(last);
            ctx.strokeStyle = '#fff';
            ctx.setLineDash([5,5]);
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
            ctx.setLineDash([]);
            
            ctx.fillStyle = '#fff';
            ctx.fillText(last.toFixed(2), width - 50, y - 5);
        }
    }

    // --- Connection Handling ---
    function connectToDeriv() {
        const appId = document.getElementById('appIdInput').value;
        const token = document.getElementById('apiTokenInput').value;

        if(!appId || !token) {
            showToast("Please enter App ID and Token", "error");
            return;
        }

        document.getElementById('loginModal').style.display = 'none';
        deriv.connect(appId, token);
    }

    function updateStatus(isConnected) {
        const el = document.getElementById('connectionStatus');
        const dot = el.querySelector('.status-dot');
        if(isConnected) {
            dot.classList.add('connected');
            el.innerHTML = '<span class="status-dot connected"></span> Live';
        } else {
            dot.classList.remove('connected');
            el.innerHTML = '<span class="status-dot"></span> Disconnected';
        }
    }

    function changeMarket(symbol, el) {
        document.querySelectorAll('.asset-item').forEach(e => e.classList.remove('active'));
        el.classList.add('active');
        deriv.subscribeTicks(symbol);
    }

    function placeTrade(type) {
        deriv.placeContract(type);
    }

    // --- Indicator & AI Logic (Attached to Live Data) ---
    deriv.onTickUpdate = (liveCandles) => {
        candles = liveCandles;
        drawChart();
        
        if(isAiRunning && candles.length > 20) {
            runAiAnalysis(candles);
        }
    };

    function runAiAnalysis(candles) {
        // Simple Momentum Strategy
        const len = candles.length;
        const current = candles[len-1].close;
        const prev = candles[len-2].close;
        const rsi = calculateRSI(candles);
        const rsiVal = rsi[rsi.length-1];

        let signal = "HOLD";
        let confidence = 0;

        // Logic
        if (rsiVal < 30) {
            signal = "CALL"; // Oversold
            confidence = 80;
        } else if (rsiVal > 70) {
            signal = "PUT"; // Overbought
            confidence = 80;
        } else if (current > candles[len-5].close) {
            signal = "CALL"; // Uptrend
            confidence = 65;
        }

        const log = document.getElementById('aiLog');
        log.innerHTML = `> Price: ${current.toFixed(2)}<br>> RSI: ${rsiVal.toFixed(1)}<br>> Signal: ${signal} (${confidence}%)`;
        
        // Auto Execute (Caution!)
        if (confidence >= 80) {
            log.innerHTML += `<br>> <strong>EXECUTING ${signal}...</strong>`;
            deriv.placeContract(signal);
            // Debounce to prevent spam
            isAiRunning = false; 
            setTimeout(() => { if(document.getElementById('aiToggle').checked) isAiRunning = true; }, 5000);
        }
    }

    function calculateRSI(data, period = 14) {
        if(data.length < period + 1) return [50];
        // Simple RSI logic on close prices
        let gains = 0, losses = 0;
        for(let i=1; i<=period; i++) {
            const diff = data[data.length - i].close - data[data.length - i - 1].close;
            if(diff > 0) gains += diff;
            else losses -= diff;
        }
        const rs = (gains/period) / (losses/period || 0.001);
        return [100 - (100 / (1 + rs))];
    }

    function toggleAI() {
        isAiRunning = document.getElementById('aiToggle').checked;
        document.getElementById('aiLog').innerHTML += "<br>> AI " + (isAiRunning ? "Enabled" : "Disabled");
    }

    // UI Helpers
    function showToast(msg, type="success") {
        const t = document.createElement('div');
        t.className = 'toast';
        t.style.borderLeftColor = type === 'error' ? 'red' : '#2563eb';
        t.innerText = msg;
        document.getElementById('toastContainer').appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    // Update payouts dynamically (just a visual approximation for demo, use proposal API for exact)
    document.getElementById('stakeInput').addEventListener('change', (e) => {
        const val = parseFloat(e.target.value);
        document.getElementById('callPayout').innerText = `+ $${(val * 0.95).toFixed(2)}`;
        document.getElementById('putPayout').innerText = `+ $${(val * 0.95).toFixed(2)}`;
    });

    resizeCanvas();

</script>
</body>
</html>
